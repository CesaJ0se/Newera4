<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Era | Inicio de sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #5e0d0d;
      --red-dark: #5e0d0d;
      --red-light: #d63148;
      --black: #0a0a0a;
      --white: #f5f5f5;
      --gray: #1a1a1a;
      --gray2: #242424;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ─── TOP BAR ─── */
    .top-bar {
      background: var(--red);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: relative;
      z-index: 100;
      border-bottom: 3px solid var(--red-dark);
    }

    .logo-img {
      height: 64px;
      width: auto;
      object-fit: contain;
      position: relative;
      top: 6px;
      z-index: 110;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
      z-index: 200;
    }
    .hamburger span {
      display: block;
      width: 26px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: all .35s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ─── BRIM ─── */
    .brim {
      background: var(--red);
      position: relative;
      height: 64px;
      z-index: 90;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: visible;
    }
    .brim::after {
      content: '';
      position: absolute;
      bottom: -28px;
      left: 0;
      width: 100%;
      height: 60px;
      background: var(--red);
      border-radius: 0 0 50% 50% / 0 0 100% 100%;
      z-index: -1;
    }
    .brim-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 100%;
      max-width: 1100px;
      padding: 10px 0 0;
    }
    .brim-nav a {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
      text-decoration: none;
      padding: 6px 22px;
      position: relative;
      transition: color .2s;
    }
    .brim-nav a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 60%;
      height: 2px;
      background: var(--white);
      border-radius: 1px;
      transition: transform .25s ease;
    }
    .brim-nav a:hover { color: #fff; }
    .brim-nav a:hover::after { transform: translateX(-50%) scaleX(1); }
    .brim-nav a.active { color: #fff; }
    .brim-nav a.active::after { transform: translateX(-50%) scaleX(1); }

    /* ─── MOBILE MENU ─── */
    .mobile-menu {
      position: fixed;
      top: 0; right: 0;
      width: 50%;
      height: 100%;
      background: rgba(10,10,10,0.97);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transform: translateX(100%);
      transition: transform .4s cubic-bezier(.77,0,.18,1);
      border-left: 2px solid var(--red-dark);
    }
    .mobile-menu.open { transform: translateX(0); }
    .mobile-menu a {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: .08em;
      color: var(--white);
      text-decoration: none;
      transition: color .2s;
    }
    .mobile-menu a:hover { color: var(--red); }
    .mobile-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none;
      border: none;
      color: var(--white);
      font-size: 1.6rem;
      cursor: pointer;
    }

    /* ─── MAIN ─── */
    .main {
      margin-top: 48px;
      min-height: calc(100vh - 180px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    /* ─── LOGIN CARD ─── */
    .login-card {
      background: var(--gray2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      width: 100%;
      max-width: 420px;
      padding: 44px 40px 48px;
      position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: var(--red);
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: .08em;
      color: var(--white);
      margin-bottom: 4px;
    }
    .card-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 32px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .label-row a {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: .08em;
      color: var(--red-light);
      text-decoration: none;
      text-transform: uppercase;
    }
    .label-row a:hover { text-decoration: underline; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      padding: 11px 14px;
      width: 100%;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    input::placeholder { color: rgba(255,255,255,0.18); }
    input:focus {
      border-color: var(--red);
      background: rgba(200,16,46,0.04);
    }
    input.error-field { border-color: #e55; }

    .input-wrap { position: relative; }
    .input-wrap input { padding-right: 44px; }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.3);
      font-size: 1rem;
      padding: 0;
      line-height: 1;
      transition: color .2s;
    }
    .toggle-pw:hover { color: rgba(255,255,255,0.7); }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 2px 0 26px;
    }
    .remember-row input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--red);
      cursor: pointer;
    }
    .remember-row span {
      font-size: 0.83rem;
      color: rgba(255,255,255,0.4);
    }

    .field-error {
      font-size: 0.75rem;
      color: #f88;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .05em;
      min-height: 14px;
      margin-top: 2px;
    }

    .msg {
      border-radius: 3px;
      padding: 12px 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.88rem;
      letter-spacing: .05em;
      margin-bottom: 20px;
      display: none;
    }
    .msg.error   { background: rgba(220,50,50,0.12); border: 1px solid rgba(220,50,50,0.3); color: #f88; }
    .msg.success { background: rgba(40,180,100,0.12); border: 1px solid rgba(40,180,100,0.3); color: #6ecf8f; }
    .msg.show    { display: block; }

    .btn-login {
      width: 100%;
      background: var(--red);
      border: none;
      border-radius: 3px;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem;
      letter-spacing: .15em;
      padding: 14px;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .btn-login:hover { background: var(--red-dark); }
    .btn-login:active { transform: scale(0.99); }
    .btn-login:disabled { background: rgba(200,16,46,0.4); cursor: not-allowed; }

    .btn-login .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner  { display: block; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .divider span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }

    .register-link {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
    }
    .register-link a {
      color: var(--red-light);
      text-decoration: none;
      font-weight: 500;
    }
    .register-link a:hover { text-decoration: underline; }

    .footer {
      text-align: center;
      padding: 28px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    @media (max-width: 768px) { .brim-nav { display: none; } }
    @media (max-width: 480px) { .login-card { padding: 32px 20px 36px; } }
  </style>
</head>
<body>

  <nav class="mobile-menu" id="mobileMenu">
    <button class="mobile-close" id="mobileClose">✕</button>
    <a href="index.html">Inicio</a>
    <a href="#">Acerca de</a>
    <a href="#">Colecciones</a>
    <a href="registro.html">Registro</a>
    <a href="login.html">Inicio de sesión</a>
  </nav>

  <header class="top-bar">
    <img src="/static/newera_Logo.png" alt="New Era Logo" class="logo-img" />
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </header>

  <div class="brim">
    <nav class="brim-nav">
     <a href="/">Inicio</a>

<a href="#">Acerca de</a>

<a href="/registro">Registro</a>

<a href="/login" class="active">Inicio de sesión</a>
    </nav>
  </div>

  <main class="main">
    <div class="login-card">

      <h1 class="card-title">Bienvenido</h1>
      <p class="card-subtitle">Inicia sesión en tu cuenta New Era</p>

      <div class="msg error"   id="msgError"></div>
      <div class="msg success" id="msgSuccess"></div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="juan@ejemplo.com" autocomplete="email" />
        <div class="field-error" id="err-email"></div>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <div class="label-row">
          <label for="password">Contraseña</label>
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password" />
          <button class="toggle-pw" id="togglePw" type="button" aria-label="Mostrar contraseña">👁</button>
        </div>
        <div class="field-error" id="err-password"></div>
      </div>

      <!-- Recordarme -->
      <div class="remember-row">
        <input type="checkbox" id="remember" />
        <span>Recordar mi sesión</span>
      </div>

      <button class="btn-login" id="btnLogin">
        <span class="btn-text">Iniciar sesión</span>
        <div class="spinner"></div>
      </button>

      <div class="divider"><span>o</span></div>

      <p class="register-link">¿No tienes cuenta? <a href="/registro">Regístrate gratis</a></p>

    </div>
  </main>

  <footer class="footer">
    &copy; 2025 New Era Cap Co. · Todos los derechos reservados
  </footer>

  <script>
    /* ── HAMBURGER ── */
    const hamburger   = document.getElementById('hamburger');
    const mobileMenu  = document.getElementById('mobileMenu');
    const mobileClose = document.getElementById('mobileClose');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });
    mobileClose.addEventListener('click', () => {
      hamburger.classList.remove('open');
      mobileMenu.classList.remove('open');
    });
    mobileMenu.querySelectorAll('a').forEach(a =>
      a.addEventListener('click', () => {
        hamburger.classList.remove('open');
        mobileMenu.classList.remove('open');
      })
    );

    /* ── TOGGLE CONTRASEÑA ── */
    const pwInput  = document.getElementById('password');
    const togglePw = document.getElementById('togglePw');
    togglePw.addEventListener('click', () => {
      const visible = pwInput.type === 'text';
      pwInput.type       = visible ? 'password' : 'text';
      togglePw.textContent = visible ? '👁' : '🙈';
    });

    /* ── VALIDACIÓN Y ENVÍO ── */
    const btn    = document.getElementById('btnLogin');
    const msgErr = document.getElementById('msgError');
    const msgOk  = document.getElementById('msgSuccess');

    function clearErrors() {
      document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
      document.querySelectorAll('input').forEach(i => i.classList.remove('error-field'));
      msgErr.classList.remove('show');
      msgOk.classList.remove('show');
    }

    function fieldError(id, msg) {
      const el  = document.getElementById('err-' + id);
      const inp = document.getElementById(id);
      if (el)  el.textContent = msg;
      if (inp) inp.classList.add('error-field');
    }

    function validate() {
      let ok = true;
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;

      if (!email) {
        fieldError('email', 'Ingresa tu correo.'); ok = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        fieldError('email', 'Correo no válido.'); ok = false;
      }
      if (!pass) {
        fieldError('password', 'Ingresa tu contraseña.'); ok = false;
      }
      return ok;
    }

    btn.addEventListener('click', async () => {
      clearErrors();
      if (!validate()) return;

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        /*
         * ─────────────────────────────────────────────────────────────
         *  LLAMADA AL BACKEND
         *  POST /api/login  →  { email, password }
         *  Respuesta OK:     { ok: true, token: "...", usuario: { nombre, email } }
         *  Respuesta error:  { ok: false, mensaje: "...", campo?: "email"|"password" }
         * ─────────────────────────────────────────────────────────────
         */
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok && data.ok) {
          /* Guardar token: localStorage si "recordarme", sessionStorage si no */
          const store = remember ? localStorage : sessionStorage;
          store.setItem('ne_token', data.token);
          if (data.usuario) store.setItem('ne_usuario', JSON.stringify(data.usuario));

          msgOk.textContent = `¡Bienvenido de nuevo, ${data.usuario?.nombre || ''}! Redirigiendo…`;
          msgOk.classList.add('show');

          setTimeout(() => { window.location.href = '/'; }, 1500);

        } else {
          const mensaje = data.mensaje || 'Credenciales incorrectas. Intenta de nuevo.';
          msgErr.textContent = mensaje;
          msgErr.classList.add('show');
          if (data.campo) fieldError(data.campo, '');
        }

      } catch (err) {
        msgErr.textContent = 'No se pudo conectar con el servidor. Verifica tu conexión.';
        msgErr.classList.add('show');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });

    /* Enter dispara el login */
    document.querySelectorAll('input').forEach(inp =>
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); })
    );

    /* Si ya hay sesión activa, redirigir directo */
    if (localStorage.getItem('ne_token') || sessionStorage.getItem('ne_token')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
